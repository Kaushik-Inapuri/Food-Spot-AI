<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Spot AI — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#ffffff;--bg2:#fafaf8;--bg3:#f5f3ef;--bg4:#ede9e2;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.12);
  --text:#1a1512;--text2:#5c5248;--text3:#9c9188;
  --gold:#c9921a;--gold2:#e8b84b;--gold3:#f5d483;
  --orange:#e05e1a;--orange2:#f07340;
  --green:#2d7a4f;--red:#c0392b;
  --font-h:'Playfair Display',serif;--font-b:'Plus Jakarta Sans',sans-serif;
  --r:10px;--rl:16px;--rxl:22px;
  --shadow:0 2px 16px rgba(0,0,0,0.08);--shadow3:0 16px 48px rgba(0,0,0,0.16);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-b);background:var(--bg3);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* NAV */
nav{height:62px;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 2rem;box-shadow:0 1px 12px rgba(0,0,0,0.06);flex-shrink:0}
.logo{font-family:var(--font-h);font-size:22px;font-weight:800;color:var(--gold);text-decoration:none;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),var(--orange));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo em{color:var(--orange);font-style:normal}

/* CARD */
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;background:linear-gradient(135deg,#fdf8ef 0%,var(--bg3) 50%,var(--bg2) 100%)}
.card{background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--rxl);padding:2.25rem;width:100%;max-width:420px;box-shadow:var(--shadow3)}
.card-title{font-family:var(--font-h);font-size:24px;font-weight:800;margin-bottom:.4rem;color:var(--text)}
.card-sub{font-size:13px;color:var(--text2);margin-bottom:1.75rem;line-height:1.65}

/* FORM */
.f-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.38rem;display:block;font-weight:600}
.f-group{margin-bottom:.9rem}
.pw-wrap{position:relative}
.f-input{width:100%;background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--r);padding:11px 42px 11px 14px;font-size:14px;font-family:var(--font-b);color:var(--text);outline:none;transition:all .18s}
.f-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,146,26,.1)}
.f-input::placeholder{color:var(--text3)}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;padding:2px;line-height:1}
.eye-btn:hover{color:var(--text2)}

/* STRENGTH BAR */
.strength-bar{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:.4rem;margin-bottom:.9rem}
.strength-fill{height:100%;border-radius:2px;transition:width .3s,background .3s}

/* BUTTON */
.btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:12px;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:var(--font-b);transition:all .2s;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;box-shadow:0 2px 12px rgba(201,146,26,.25)}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(201,146,26,.35)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* MESSAGES */
.msg{padding:10px 14px;border-radius:var(--r);font-size:13px;margin-bottom:1rem;display:none;line-height:1.5}
.msg.ok{background:rgba(45,122,79,.07);color:var(--green);border:1px solid rgba(45,122,79,.2)}
.msg.err{background:rgba(192,57,43,.06);color:var(--red);border:1px solid rgba(192,57,43,.15)}

/* SPINNER */
.spinner{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* SUCCESS CARD */
.success-card{text-align:center}
.success-icon{font-size:48px;margin-bottom:1rem;display:block}
.back-link{display:block;text-align:center;margin-top:1rem;font-size:13px;color:var(--text3)}
.back-link a{color:var(--gold);text-decoration:none;font-weight:600}
.back-link a:hover{text-decoration:underline}
</style>
</head>
<body>

<nav>
  <a class="logo" href="/">
    <div class="logo-icon">🍽️</div>
    Food Spot<em> AI</em>
  </a>
</nav>

<div class="wrap">

  <!-- RESET FORM -->
  <div class="card" id="reset-card">
    <div class="card-title">Set new password 🔑</div>
    <div class="card-sub">Choose a strong password for your Food Spot AI account.</div>

    <div class="msg" id="msg"></div>

    <div class="f-group">
      <label class="f-label">New Password</label>
      <div class="pw-wrap">
        <input class="f-input" type="password" id="pw1" placeholder="Min 6 characters" oninput="checkStrength()">
        <button class="eye-btn" type="button" onclick="togglePw('pw1',this)">👁</button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="str-fill" style="width:0%"></div></div>
    </div>

    <div class="f-group">
      <label class="f-label">Confirm Password</label>
      <div class="pw-wrap">
        <input class="f-input" type="password" id="pw2" placeholder="Repeat password" onkeydown="if(event.key==='Enter')doReset()">
        <button class="eye-btn" type="button" onclick="togglePw('pw2',this)">👁</button>
      </div>
    </div>

    <button class="btn" id="reset-btn" onclick="doReset()">Reset Password</button>

    <div class="back-link"><a href="/">← Back to login</a></div>
  </div>

  <!-- SUCCESS STATE -->
  <div class="card success-card" id="done-card" style="display:none">
    <span class="success-icon">✅</span>
    <div class="card-title" style="text-align:center">Password reset!</div>
    <div class="card-sub" style="text-align:center;margin-bottom:1.5rem">Your password has been updated successfully. You can now log in with your new password.</div>
    <a class="btn" href="/" style="text-decoration:none">Go to Login →</a>
  </div>

</div>

<script>
// ── IMPORTANT: Must match your deployed backend URL ───────
const API = 'https://food-spot-ai.onrender.com/api';

// ── Get token + email from URL params ────────────────────
const params = new URLSearchParams(window.location.search);
const TOKEN  = params.get('token');
const EMAIL  = params.get('email');

// Validate link on load
window.addEventListener('DOMContentLoaded', () => {
  if (!TOKEN || !EMAIL) {
    showMsg('err', 'Invalid or missing reset link. Please request a new one from the login page.');
    document.getElementById('reset-btn').disabled = true;
  }
});

// ── Password strength bar ─────────────────────────────────
function checkStrength() {
  const pw   = document.getElementById('pw1').value;
  const fill = document.getElementById('str-fill');
  let score  = 0;
  if (pw.length >= 6)            score++;
  if (pw.length >= 10)           score++;
  if (/[A-Z]/.test(pw))          score++;
  if (/[0-9]/.test(pw))          score++;
  if (/[^A-Za-z0-9]/.test(pw))   score++;
  const pct   = (score / 5) * 100;
  const color = score <= 1 ? '#c0392b' : score <= 3 ? '#c9921a' : '#2d7a4f';
  fill.style.width      = pct + '%';
  fill.style.background = color;
}

// ── Toggle password visibility ────────────────────────────
function togglePw(id, btn) {
  const el  = document.getElementById(id);
  const vis = el.type === 'password';
  el.type   = vis ? 'text' : 'password';
  btn.textContent = vis ? '🙈' : '👁';
}

// ── Show message ──────────────────────────────────────────
function showMsg(type, text) {
  const el = document.getElementById('msg');
  el.className   = 'msg ' + type;
  el.textContent = text;
  el.style.display = 'block';
}

// ── Reset password ────────────────────────────────────────
async function doReset() {
  const btn = document.getElementById('reset-btn');
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;

  // Client-side validation
  if (!pw1 || pw1.length < 6) {
    showMsg('err', 'Password must be at least 6 characters.');
    return;
  }
  if (pw1 !== pw2) {
    showMsg('err', 'Passwords do not match.');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Resetting…';
  document.getElementById('msg').style.display = 'none';

  try {
    const res = await fetch(`${API}/auth/reset-password`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        token:       TOKEN,
        email:       EMAIL,
        newPassword: pw1,
      }),
    });

    const data = await res.json();

    if (!data.success) {
      showMsg('err', data.message || 'Reset failed. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Reset Password';
      return;
    }

    // Success — show done card
    document.getElementById('reset-card').style.display = 'none';
    document.getElementById('done-card').style.display  = '';

  } catch (err) {
    console.error('Reset error:', err);
    showMsg('err', 'Network error. Please check your connection and try again. If the problem persists, the server may be starting up — wait 30 seconds and try again.');
    btn.disabled = false;
    btn.textContent = 'Reset Password';
  }
}
</script>
</body>
</html>
